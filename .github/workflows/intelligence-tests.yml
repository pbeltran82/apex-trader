name: Intelligence safeguards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile active engine
        run: >-
          python -m py_compile
          main.py
          api/market_data.py
          api/historical_data.py
          api/intelligence.py
          api/portfolio_constraints.py
          api/runtime_hardening.py
          api/risk_gate.py
          api/decision_engine.py
          api/security.py
          api/system_readiness.py
          api/backtest.py
      - name: Run intelligence tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build production dashboard
        run: npm run build --prefix frontend
