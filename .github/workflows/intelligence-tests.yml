name: Intelligence safeguards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            .github
            api
            frontend
            scripts
            tests
            main.py
          sparse-checkout-cone-mode: false
      - name: Validate deployment script
        run: bash -n scripts/deploy_oracle.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile active engine
        run: >-
          python -m py_compile
          main.py
          api/market_data.py
          api/historical_data.py
          api/intelligence.py
          api/portfolio_constraints.py
          api/advanced_risk.py
          api/runtime_hardening.py
          api/risk_gate.py
          api/decision_engine.py
          api/security.py
          api/strategy_validation.py
          api/system_readiness.py
          api/backtest.py
          api/research.py
          api/research_execution.py
          api/shadow_mode.py
          api/pre_monday_hardening.py
      - name: Run intelligence tests
        id: intelligence_tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -q > test-output.txt 2>&1
          status=$?
          cat test-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-test-output
          path: test-output.txt
          retention-days: 1
      - name: Fail when tests fail
        if: steps.intelligence_tests.outputs.status != '0'
        run: exit 1
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build production dashboard
        run: npm run build --prefix frontend
