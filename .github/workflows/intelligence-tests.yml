name: Intelligence safeguards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            .github
            api
            frontend
            scripts
            tests
            main.py
          sparse-checkout-cone-mode: false
      - name: Validate deployment scripts
        run: |
          bash -n scripts/deploy_oracle.sh
          bash -n scripts/install_session_supervisor.sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: python -m pip install fastapi pydantic
      - name: Compile active engine
        run: >-
          python -m py_compile
          main.py
          api/market_data.py
          api/historical_data.py
          api/intelligence.py
          api/portfolio_constraints.py
          api/advanced_risk.py
          api/runtime_hardening.py
          api/risk_gate.py
          api/decision_engine.py
          api/security.py
          api/strategy_validation.py
          api/system_readiness.py
          api/backtest.py
          api/research.py
          api/research_execution.py
          api/shadow_mode.py
          api/pre_monday_hardening.py
          scripts/market_session_supervisor.py
      - name: Run intelligence tests
        run: python -m unittest discover -s tests -p "test_*.py" -q
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build production dashboard
        run: npm run build --prefix frontend
